---
- import_playbook: ../99-utils/kube-connect.yml
- name: Deploy Health Check Components
  hosts: k8s
  gather_facts: false
  
  tasks:
    - name: Deploy Health Endpoints via Helm
      kubernetes.core.helm:
        name: "{{ health.release_name_prefix }}-main"
        chart_ref: "{{ playbook_dir }}/charts/h3xinfra-health-main"
        namespace: default
        create_namespace: false
        values:
          fullnameOverride: "{{ health.release_name_prefix }}-main"
        state: present
        wait: true
        timeout: "120s"

      
    - name: Test anonymous access to livez endpoint
      # The k3s API server is reached by node IP (not by a name in the
      # serving cert SANs) and is signed by k3s's internal CA which we do
      # not import on the controller. This check is a liveness probe, not
      # a TLS posture assertion, so cert validation is intentionally off.
      # Do NOT copy this pattern to checks against application endpoints.
      ansible.builtin.uri:
        url: "https://{{ hostvars[groups['server'][0]]['ansible_host'] }}:6443/livez"
        method: GET
        validate_certs: no  # noqa: risky-shell-pipe see comment above
        status_code: 200
      