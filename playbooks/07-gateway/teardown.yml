---
- import_playbook: ../99-utils/kube-connect.yml

- name: Remove Envoy Gateway and shared Gateway resource
  hosts: k8s
  gather_facts: false

  tasks:
    - name: Uninstall Gateway pre-configuration via Helm
      kubernetes.core.helm:
        name: "{{ gateway.release_name_prefix }}-pre"
        namespace: "{{ gateway.namespace }}"
        state: absent
        wait: true
        timeout: "300s"

    - name: Uninstall Envoy Gateway controller via Helm
      kubernetes.core.helm:
        name: "{{ gateway.release_name_prefix }}-controller"
        namespace: "{{ gateway.namespace }}"
        state: absent
        wait: true
        timeout: "300s"

    - name: Remove Gateway namespace
      kubernetes.core.k8s:
        state: absent
        api_version: v1
        kind: Namespace
        name: "{{ gateway.namespace }}"
        wait: true
        wait_timeout: 300

    # NOTE: Gateway API and Envoy Gateway CRDs (cluster-scoped) are
    # intentionally NOT removed here. They may be referenced by HTTPRoute /
    # SecurityPolicy / Gateway resources in other namespaces, and removing
    # the CRDs would cascade-delete every dependent resource on the cluster.
    # Operators who genuinely want a clean slate should run, after this
    # playbook completes:
    #   kubectl delete -f <gateway-crds-bundle.yaml>
