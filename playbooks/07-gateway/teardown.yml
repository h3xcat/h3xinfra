---
- import_playbook: ../99-utils/kube-connect.yml

- name: Remove Envoy Gateway and shared Gateway resource
  hosts: k8s
  gather_facts: false

  tasks:
    - name: Uninstall Gateway pre-configuration via Helm
      kubernetes.core.helm:
        name: "{{ gateway.release_name_prefix }}-pre"
        namespace: "{{ gateway.namespace }}"
        state: absent
        wait: true
        timeout: "300s"

    - name: Uninstall Envoy Gateway controller via Helm
      kubernetes.core.helm:
        name: "{{ gateway.release_name_prefix }}-controller"
        namespace: "{{ gateway.namespace }}"
        state: absent
        wait: true
        timeout: "300s"

    - name: Remove Gateway namespace
      kubernetes.core.k8s:
        state: absent
        api_version: v1
        kind: Namespace
        name: "{{ gateway.namespace }}"
        wait: true
        wait_timeout: 300
