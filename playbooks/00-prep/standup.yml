---
- name: Prepare all K3s nodes
  hosts: k3s_cluster
  become: yes
  tasks:
    - name: Install prerequisites
      apt:
        name:
          - curl
          - ufw
          - apparmor
          - apparmor-utils
          - open-iscsi
          - nfs-common
          - cryptsetup
          - dmsetup
          # rasdaemon: logs hardware RAS events (MCE, EDAC, PCIe AER) so future
          # silent freezes leave a trace in /var/lib/rasdaemon/ras-mc_event.db.
          - rasdaemon
        update_cache: yes
        state: present

    - name: Enable iscsi service
      service:
        name: iscsid
        state: started
        enabled: true
    
    - name: Disable UFW
      service:
        name: ufw
        state: stopped
        enabled: false
    
    - name: Disable multipath
      service:
        name: multipathd
        state: stopped
        enabled: false

    - name: Enable AppArmor
      service:
        name: apparmor
        state: started
        enabled: true

    - name: Enable rasdaemon (hardware error logging)
      service:
        name: rasdaemon
        state: started
        enabled: true

    - name: Disable swap immediately
      command: swapoff -a
      become: true
      when: ansible_swaptotal_mb > 0

    - name: Comment out any swap entries in /etc/fstab
      replace:
        path: /etc/fstab
        regexp: '^([^#].*\bswap\b.*)'
        replace: '# \1 # commented by Ansible'

    # snapd burns ~50–100 MB resident plus periodic CPU/IO for auto-refresh
    # checks. Nothing in the h3xinfra stack uses snaps; disabling it recovers
    # memory on the 8 GiB Pi nodes and removes a class of background noise
    # that complicates kernel-freeze investigations.
    - name: Disable snapd
      systemd:
        name: "{{ item }}"
        state: stopped
        enabled: false
      loop:
        - snapd.socket
        - snapd.service
      failed_when: false

    # Cap journald disk usage so journals don't slowly fill the rootfs over
    # months. 500 MiB is plenty for ~weeks of logs at typical homelab
    # verbosity; rotation handles the rest.
    - name: Cap journald disk usage
      community.general.ini_file:
        path: /etc/systemd/journald.conf
        section: Journal
        option: SystemMaxUse
        value: 500M
        backup: yes
        no_extra_spaces: yes
      register: journald_conf_changed

    - name: Restart journald if config changed
      service:
        name: systemd-journald
        state: restarted
      when: journald_conf_changed.changed

    - name: Configure modprobe modules
      modprobe:
        name: "{{ item }}"
        state: present
        persistent: present
      loop:
        - br_netfilter
        - overlay
        - dm_crypt
        - vfio_pci
        - uio_pci_generic
        - nvme-tcp
        # Loaded ahead of the BBR sysctl so net.ipv4.tcp_congestion_control=bbr
        # below applies on first run without a reboot.
        - tcp_bbr

    # Hardware watchdog: load the right driver per arch so /dev/watchdog0
    # exists for systemd to pet. Combined with kernel.{soft,hard}lockup_panic
    # and the systemd RuntimeWatchdogSec configured below, a wedged kernel or
    # frozen PID 1 will trigger a hard reset rather than an indefinite hang.
    #
    # iTCO_wdt is blacklisted by Ubuntu in /lib/modprobe.d/blacklist_linux_<ver>.conf
    # (shipped by linux-modules-<ver>), so systemd-modules-load refuses to
    # touch it. We load it now via the Ansible modprobe module (which calls
    # the `modprobe` binary -- by exact module name it ignores the blacklist)
    # and install a small systemd oneshot unit so the same `modprobe` call
    # re-runs on every boot, bypassing the blacklist at startup too.
    - name: Load hardware watchdog driver (Intel chipsets, x86)
      modprobe:
        name: iTCO_wdt
        state: present
      when: ansible_architecture == "x86_64"
      failed_when: false

    - name: Remove stale modules-load.d entry for iTCO_wdt (blacklist makes it a no-op)
      file:
        path: /etc/modules-load.d/iTCO_wdt.conf
        state: absent
      when: ansible_architecture == "x86_64"

    - name: Install systemd unit to force-load iTCO_wdt at boot (x86)
      copy:
        dest: /etc/systemd/system/load-itco-wdt.service
        owner: root
        group: root
        mode: '0644'
        content: |
          [Unit]
          Description=Load iTCO hardware watchdog (bypass Ubuntu kernel blacklist)
          DefaultDependencies=no
          After=systemd-modules-load.service
          Before=sysinit.target
          ConditionPathExists=!/dev/watchdog0

          [Service]
          Type=oneshot
          ExecStart=/sbin/modprobe iTCO_wdt
          RemainAfterExit=yes

          [Install]
          WantedBy=sysinit.target
      register: load_itco_unit
      when: ansible_architecture == "x86_64"

    - name: Enable iTCO_wdt loader systemd unit (x86)
      systemd:
        name: load-itco-wdt.service
        enabled: true
        daemon_reload: "{{ load_itco_unit.changed | default(false) }}"
      when: ansible_architecture == "x86_64"

    - name: Load hardware watchdog driver (Raspberry Pi, ARM)
      modprobe:
        name: bcm2835_wdt
        state: present
        persistent: present
      when: ansible_architecture == "aarch64"
      failed_when: false

    - name: Configure sysctl settings
      ansible.posix.sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        state: present
        sysctl_set: true
        reload: yes
      loop:
        - { name: net.bridge.bridge-nf-call-iptables, value: "1" }
        - { name: net.bridge.bridge-nf-call-ip6tables, value: "1" }
        - { name: net.ipv4.ip_forward, value: "1" }
        - { name: net.ipv6.conf.all.forwarding, value: "1" }
        - { name: net.ipv6.conf.default.forwarding, value: "1" }
        - { name: net.ipv6.conf.all.accept_ra, value: "2" }
        - { name: net.ipv6.conf.default.accept_ra, value: "2" }
        - { name: net.ipv6.conf.all.accept_ra_defrtr, value: "0" }
        - { name: net.ipv6.conf.default.accept_ra_defrtr, value: "0" }
        - { name: net.ipv6.conf.all.use_tempaddr, value: "0" }
        - { name: net.ipv6.conf.default.use_tempaddr, value: "0" }
        # Required by WireGuard (wg-quick fwmark routing) for the qBittorrent stack
        # so the workload no longer needs a privileged sysctl init container. See SECURITY_AUDIT.md F5.
        - { name: net.ipv4.conf.all.src_valid_mark, value: "1" }
        # Raise inotify limits -- kubelet, container runtime, and log shippers exhaust
        # the defaults on busy nodes, breaking apt and other tools that watch directories.
        - { name: fs.inotify.max_user_watches, value: "1048576" }
        - { name: fs.inotify.max_user_instances, value: "8192" }
        # Panic + auto-reboot on detected kernel lockups so a wedged node
        # self-recovers instead of sitting NotReady until manually power-cycled.
        # Combined with the existing panic=10 / panic_on_oops=1, the chain is:
        # detect lockup -> kernel panic -> 10s grace -> reboot.
        - { name: kernel.softlockup_panic, value: "1" }
        - { name: kernel.hardlockup_panic, value: "1" }
        - { name: kernel.panic, value: "10" }
        - { name: kernel.panic_on_oops, value: "1" }
        # Memory + scheduling tuning for k8s nodes. Swap is off, but
        # vm.swappiness still governs how aggressively the kernel reclaims
        # anonymous pages to file-backed cache; vm.overcommit_memory=1 is
        # the k8s convention (avoids fork() failure under legitimate overcommit).
        - { name: vm.swappiness, value: "10" }
        - { name: vm.overcommit_memory, value: "1" }
        # BBR congestion control + larger TCP buffers for sustained
        # throughput on long-fat-network paths (NNTP via sabnzbd, BitTorrent
        # peering, Plex remote streaming). tcp_bbr is loaded above.
        - { name: net.ipv4.tcp_congestion_control, value: "bbr" }
        - { name: net.core.somaxconn, value: "65535" }
        - { name: net.ipv4.tcp_max_syn_backlog, value: "8192" }
        - { name: net.core.netdev_max_backlog, value: "16384" }
        - { name: net.core.rmem_max, value: "16777216" }
        - { name: net.core.wmem_max, value: "16777216" }

    # DNSSEC is left disabled here. Strict client-side validation (DNSSEC=yes)
    # stalls 5-10s on deeply-delegated, short-TTL CDN zones (e.g. Akamai-backed
    # cdn0X.quay.io), which exceeds containerd's pull-time resolver timeout and
    # breaks image pulls (EAI_AGAIN / "Try again" -> ImagePullBackOff). The
    # upstream resolver still validates DNSSEC, so client-side validation here is
    # redundant. allow-downgrade does not help: those zones are signed, just slow.
    - name: Configure DNSSEC in systemd-resolved
      lineinfile:
        path: /etc/systemd/resolved.conf
        regexp: '^#?DNSSEC='
        line: 'DNSSEC=no'
        backup: yes
      register: resolved_conf_changed

    - name: Restart systemd-resolved if configuration changed
      service:
        name: systemd-resolved
        state: restarted
      when: resolved_conf_changed.changed

    # Wire systemd to the hardware watchdog loaded above. If PID 1 stops
    # pinging /dev/watchdog0 for RuntimeWatchdogSec, the watchdog resets the
    # node. ShutdownWatchdogSec bounds how long a stuck shutdown can wait
    # before the same mechanism forces the reboot.
    - name: Configure systemd hardware watchdog
      community.general.ini_file:
        path: /etc/systemd/system.conf
        section: Manager
        option: "{{ item.option }}"
        value: "{{ item.value }}"
        backup: yes
        no_extra_spaces: yes
      loop:
        - { option: RuntimeWatchdogSec, value: "30s" }
        - { option: ShutdownWatchdogSec, value: "10min" }
      register: systemd_watchdog_changed

    - name: Re-exec systemd if watchdog config changed
      command: systemctl daemon-reexec
      when: systemd_watchdog_changed.changed

    # Hugepages: previously pre-allocated 1024 * 2 MiB = 2 GiB per node, but
    # nothing in the stack requests `hugepages-2Mi` resources, so the memory
    # was effectively dead-weight (~2 GiB/node, ~16 GiB cluster-wide). We
    # zero the runtime allocation here and strip `hugepages=N` from the
    # kernel cmdline below so the change survives reboots. Reintroduce if
    # a workload (e.g. CNPG with large shared_buffers, DPDK) ever needs them.
    - name: Check current huge page allocation
      shell: cat /sys/kernel/mm/hugepages/hugepages-2048kB/nr_hugepages
      register: hugepage_current
      changed_when: false

    - name: Release huge page allocation (runtime)
      shell: echo 0 > /sys/kernel/mm/hugepages/hugepages-2048kB/nr_hugepages
      register: hugepage_result
      changed_when: true
      when: hugepage_current.stdout != "0"

    - name: Verify huge page allocation is zero
      shell: cat /sys/kernel/mm/hugepages/hugepages-2048kB/nr_hugepages
      register: hugepage_check
      changed_when: false

    - name: Check if GRUB configuration exists
      stat:
        path: /etc/default/grub
      register: grub_exists

    # Kernel cmdline (GRUB systems, i.e. x86 nodes):
    #   intel_idle.max_cstate=1     - cap intel_idle to C1.
    #   processor.max_cstate=1      - same cap via the ACPI path, in case the
    #                                 intel_idle driver is not engaged.
    # The C-state caps mitigate silent kernel freezes seen on some Intel
    # consumer SoCs (e.g. Alder Lake-N mini-PCs) where the CPU never
    # successfully wakes from a deep idle state. Cost: marginal extra power
    # draw at idle; on AMD or non-Intel x86 the intel_idle param is ignored.
    - name: Set kernel cmdline (GRUB systems)
      lineinfile:
        path: /etc/default/grub
        regexp: '^GRUB_CMDLINE_LINUX='
        line: 'GRUB_CMDLINE_LINUX="intel_idle.max_cstate=1 processor.max_cstate=1"'
        backup: yes
      register: grub_updated
      when: grub_exists.stat.exists

    - name: Update GRUB configuration
      command: update-grub
      when: grub_updated.changed and grub_exists.stat.exists

    # Strip any legacy `hugepages=N` argument from the Pi kernel cmdline.
    # cmdline.txt is a single space-separated line; the replace below removes
    # the token plus any preceding whitespace, leaving the rest intact.
    - name: Remove hugepages from Raspberry Pi cmdline.txt
      replace:
        path: "{{ item }}"
        regexp: '\s*hugepages=\d+'
        replace: ''
        backup: no
      loop:
        - /boot/firmware/cmdline.txt
        - /boot/cmdline.txt
      register: rpi_cmdline_updated
      failed_when: false
      when: not grub_exists.stat.exists

    - name: Check if ubuntu-vg volume group exists
      shell: vgs ubuntu-vg --noheadings 2>/dev/null
      register: ubuntu_vg_check
      changed_when: false
      failed_when: false

    - name: Check if longhorn-storage-lv logical volume exists
      shell: lvs ubuntu-vg/longhorn-storage-lv --noheadings 2>/dev/null
      register: longhorn_lv_check
      changed_when: false
      failed_when: false
      when: ubuntu_vg_check.rc == 0

    - name: Create logical volume for Longhorn storage
      lvol:
        vg: ubuntu-vg
        lv: longhorn-storage-lv
        size: 100%PVS
        pvs: /dev/nvme0n1p3
        state: present
      when: ubuntu_vg_check.rc == 0 and longhorn_lv_check.rc != 0

    - name: Format Longhorn logical volume with ext4
      filesystem:
        fstype: ext4
        dev: /dev/ubuntu-vg/longhorn-storage-lv
        resizefs: true
      when: ubuntu_vg_check.rc == 0 and longhorn_lv_check.rc != 0

    - name: Create Longhorn storage directory
      file:
        path: /var/lib/longhorn/
        state: directory
        mode: '0755'
        owner: root
        group: root

    - name: Mount Longhorn storage (LVM)
      mount:
        path: /var/lib/longhorn/
        src: /dev/ubuntu-vg/longhorn-storage-lv
        fstype: ext4
        opts: defaults
        state: mounted
      when: ubuntu_vg_check.rc == 0 and longhorn_lv_check.rc != 0

    - name: Set permissions on Longhorn directory
      file:
        path: /var/lib/longhorn/
        state: directory
        mode: '0755'
        owner: root
        group: root

    - name: Configure PAM limits
      community.general.pam_limits:
        domain: "{{ item.domain }}"
        limit_type: "{{ item.limit_type }}"
        limit_item: "{{ item.limit_item }}"
        value: "{{ item.value }}"
      loop:
        - { domain: '*', limit_type: 'soft', limit_item: 'nproc', value: '65536' }
        - { domain: '*', limit_type: 'hard', limit_item: 'nproc', value: '131072' }
        - { domain: '*', limit_type: 'soft', limit_item: 'nofile', value: '131072' }
        - { domain: '*', limit_type: 'hard', limit_item: 'nofile', value: '1048576' }
        - { domain: 'root', limit_type: 'soft', limit_item: 'nproc', value: '65536' }
        - { domain: 'root', limit_type: 'hard', limit_item: 'nproc', value: '131072' }
        - { domain: 'root', limit_type: 'soft', limit_item: 'nofile', value: '131072' }
        - { domain: 'root', limit_type: 'hard', limit_item: 'nofile', value: '1048576' }
