{{- if and .Values.gatewayRoute.enabled .Values.gatewayRoute.oidc.enabled .Values.gatewayRoute.oidc.clientSecret }}
---
# Client secret consumed by the SecurityPolicy OIDC filter. Envoy Gateway
# reads the `client-secret` key from this Secret. Must match the secret
# configured on the Keycloak client of the same clientID.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.gatewayRoute.oidc.secretRef.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "h3xinfra-mailu-pre.labels" . | nindent 4 }}
type: Opaque
stringData:
  client-secret: {{ .Values.gatewayRoute.oidc.clientSecret | quote }}
{{- end }}
