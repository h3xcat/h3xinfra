---
- import_playbook: ../99-utils/kube-connect.yml

- name: Teardown kured
  hosts: k8s
  gather_facts: false

  tasks:
    - name: Remove kured Helm release
      kubernetes.core.helm:
        name: "{{ kured.release_name_prefix }}-main"
        release_namespace: "{{ kured.namespace }}"
        state: absent
        wait: true
        timeout: "120s"

    - name: Remove kured namespace
      kubernetes.core.k8s:
        api_version: v1
        kind: Namespace
        name: "{{ kured.namespace }}"
        state: absent
        wait: true
        wait_timeout: 120
