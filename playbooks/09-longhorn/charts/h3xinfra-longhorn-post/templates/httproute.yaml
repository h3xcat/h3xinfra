{{- if .Values.longhornIngress.host }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "h3xinfra-longhorn-post.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "h3xinfra-longhorn-post.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.longhornIngress.gateway.name }}
      namespace: {{ .Values.longhornIngress.gateway.namespace }}
  hostnames:
    - {{ .Values.longhornIngress.host | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: longhorn-frontend
          port: 80
{{- end }}
