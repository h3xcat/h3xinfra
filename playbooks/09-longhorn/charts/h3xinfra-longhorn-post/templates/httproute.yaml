{{- if .Values.longhornIngress.host }}
{{- /* Fail fast if access controls are not configured: an HTTPRoute without
       a SecurityPolicy would publish the Longhorn UI unauthenticated. */ -}}
{{- if not (or .Values.longhornIngress.trustedIPs .Values.longhornIngress.oidc.enabled) -}}
{{- fail "longhornIngress: at least one of `trustedIPs` or `oidc.enabled` must be set; refusing to render an unauthenticated HTTPRoute." -}}
{{- end -}}
{{- $gwName := required "longhornIngress.gateway.name is required" .Values.longhornIngress.gateway.name -}}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "h3xinfra-longhorn-post.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "h3xinfra-longhorn-post.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ $gwName | quote }}
      {{- with .Values.longhornIngress.gateway.namespace }}
      namespace: {{ . | quote }}
      {{- end }}
  hostnames:
    - {{ .Values.longhornIngress.host | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: longhorn-frontend
          port: 80
{{- end }}
