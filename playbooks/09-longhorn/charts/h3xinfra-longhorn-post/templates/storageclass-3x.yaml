---
# Longhorn StorageClass with 3 replicas instead of the cluster default
# (set by `defaultSettings.defaultReplicaCount` on the longhorn-main chart).
#
# Use for PVCs holding irreplaceable / hard-to-rebuild state where a
# second-node-failure-during-rebuild scenario is unacceptable:
#   - Keycloak / CNPG Postgres data
#   - *arr stack config databases (SQLite on PVC)
#   - Plex library + watch state
#   - Anything else where data loss requires hours of operator work
#
# Volumes provisioned through this class carry the
# `recurring-job-group.longhorn.io/default=enabled` label so the existing
# daily-snapshot + weekly-backup RecurringJobs cover them automatically.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-3x
  labels:
    {{- include "h3xinfra-longhorn-post.labels" . | nindent 4 }}
provisioner: driver.longhorn.io
allowVolumeExpansion: true
reclaimPolicy: Delete
volumeBindingMode: Immediate
parameters:
  numberOfReplicas: "3"
  staleReplicaTimeout: "30"
  fromBackup: ""
  fsType: "ext4"
  dataLocality: "best-effort"
  unmapMarkSnapChainRemoved: "ignored"
  disableRevisionCounter: "true"
  recurringJobSelector: '[{"name":"default", "isGroup":true}]'
