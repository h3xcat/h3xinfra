---
- import_playbook: ../99-utils/kube-connect.yml

- name: Setup Longhorn CLI and check preflight requirements
  hosts: k3s_cluster
  gather_facts: true
  become: true
  vars:
    longhorn_cli_version: "{{ cli_versions.longhorn_cli }}"
    longhorn_cli_arch: "{{ 'amd64' if ansible_architecture == 'x86_64' else 'arm64' }}"
  serial: 1 
  tasks:
    - name: Download Longhorn CLI
      get_url:
        url: "https://github.com/longhorn/cli/releases/download/{{ longhorn_cli_version }}/longhornctl-linux-{{ longhorn_cli_arch }}"
        dest: "/usr/local/bin/longhornctl"
        mode: '0755'
        owner: root
        group: root

    - name: Verify Longhorn CLI installation
      command: longhornctl version
      register: longhorn_cli_version_output
      changed_when: false

    - name: Display Longhorn CLI version
      debug:
        msg: "{{ longhorn_cli_version_output.stdout }}"

- name: Deploy Longhorn via Helm
  hosts: k8s
  gather_facts: true
  vars:
  tasks:
    - name: Add Longhorn Helm repository
      kubernetes.core.helm_repository:
        name: longhorn
        repo_url: https://charts.longhorn.io
        state: present
        force_update: true
      changed_when: false

    - name: Create Longhorn namespace
      kubernetes.core.k8s:
        api_version: v1
        kind: Namespace
        name: "{{ longhorn.namespace }}"
        state: present
        wait: true

    - name: Deploy Longhorn pre-configuration via Helm
      kubernetes.core.helm:
        name: "{{ longhorn.release_name_prefix }}-pre"
        chart_ref: "{{ playbook_dir }}/charts/h3xinfra-longhorn-pre"
        namespace: "{{ longhorn.namespace }}"
        create_namespace: false
        values:
          fullnameOverride: "{{ longhorn.release_name_prefix }}-pre"
          longhornCifsSecret:
            cifsUsername: "{{ longhorn.cifs_username }}"
            cifsPassword: "{{ longhorn.cifs_password }}"
        state: present
        wait: true
        timeout: "120s"

    - name: Deploy Longhorn via Helm
      kubernetes.core.helm:
        name: "{{ longhorn.release_name_prefix }}-main"
        chart_ref: "longhorn/longhorn"
        chart_version: "{{ chart_versions.longhorn }}"
        namespace: "{{ longhorn.namespace }}"
        create_namespace: false
        values: 
          defaultSettings:
            # Storage Configuration
            defaultDataPath: /var/lib/longhorn/
            storageMinimalAvailablePercentage: 10
            storageOverProvisioningPercentage: 200
            storageReservedPercentageForDefaultDisk: 5

            # Performance Optimization
            defaultReplicaCount: 2
            defaultDataLocality: best-effort
            replicaAutoBalance: least-effort

            # High Availability and Resilience
            replicaSoftAntiAffinity: "false"
            allowVolumeCreationWithDegradedAvailability: "false"
            rwxVolumeFastFailover: "true"
            # Auto-failover stuck pods (StatefulSet/Deployment) when their node goes down,
            # so RWO volumes can be reattached on a healthy node without manual intervention.
            nodeDownPodDeletionPolicy: delete-both-statefulset-and-deployment-pod

            # Instance Manager CPU (V1 Data Engine)
            guaranteedInstanceManagerCpu: 15

            # Backup and Maintenance
            createDefaultDiskLabeledNodes: "false"
          defaultBackupStore:
            backupTarget: "{{ longhorn.cifs_backup_target }}"
            backupTargetCredentialSecret: "{{ longhorn.release_name_prefix }}-pre-cifs-secret"

        state: present
        wait: true
        timeout: "120s"

    - name: Validate Longhorn OIDC configuration
      ansible.builtin.assert:
        that:
          - longhorn.auth.oauth2_proxy.oidc_issuer_url | default('') | length > 0
          - longhorn.auth.oauth2_proxy.client_id     | default('') | length > 0
          - longhorn.auth.oauth2_proxy.client_secret | default('') | length > 0
        fail_msg: >-
          longhorn.auth.method == 'oauth2_proxy' requires
          longhorn.auth.oauth2_proxy.{oidc_issuer_url,client_id,client_secret}
          to all be set.
      when: (longhorn.auth.method | default('none')) == 'oauth2_proxy'

    - name: Deploy Longhorn configuration via Helm
      kubernetes.core.helm:
        name: "{{ longhorn.release_name_prefix }}-post"
        chart_ref: "{{ playbook_dir }}/charts/h3xinfra-longhorn-post"
        namespace: "{{ longhorn.namespace }}"
        create_namespace: false
        values:
          fullnameOverride: "{{ longhorn.release_name_prefix }}-post"
          longhornIngress:
            host: "{{ longhorn.ingress_host }}"
            gateway:
              name: "{{ gateway.release_name_prefix }}-pre-shared"
              namespace: "{{ gateway.namespace }}"
            trustedIPs: "{{ longhorn.trusted_ips }}"
            oidc:
              enabled: "{{ (longhorn.auth.method | default('none')) == 'oauth2_proxy' }}"
              issuerUrl: "{{ longhorn.auth.oauth2_proxy.oidc_issuer_url | default('') }}"
              clientId: "{{ longhorn.auth.oauth2_proxy.client_id | default('') }}"
              clientSecret: "{{ longhorn.auth.oauth2_proxy.client_secret | default('') }}"
              secretRef:
                name: "{{ longhorn.release_name_prefix }}-oidc"
                
        state: present
        wait: true
        timeout: "120s"
