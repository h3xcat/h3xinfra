---
# Master playbook to orchestrate the complete K3s cluster setup
# using the component-based directory structure

- import_playbook: 00-prep/standup.yml

- import_playbook: 01-k3s/standup.yml

# Single kubectl connection check for components that need kubernetes
- import_playbook: 99-utils/kube-connect.yml

# Cluster-wide PriorityClasses (platform-critical, app-background) consumed
# by downstream layers to control eviction order under node pressure.
- import_playbook: 01-priorityclasses/standup.yml

- import_playbook: 02-cilium/standup.yml

- import_playbook: 03-metallb/standup.yml

- import_playbook: 04-health/standup.yml

- import_playbook: 05-certmanager/standup.yml

- import_playbook: 06-externaldns/standup.yml

- import_playbook: 07-gateway/standup.yml

- import_playbook: 08-smb/standup.yml

- import_playbook: 09-longhorn/standup.yml

# Rolling reboot orchestration. Deploys kured (Kubernetes Reboot Daemon)
# which watches /var/run/reboot-required and drains+reboots one node at a
# time when set. Depends on Longhorn's nodeDrainPolicy from 09-longhorn.
- import_playbook: 10-kured/standup.yml

- import_playbook: 10-mailu/standup.yml

# Display cluster status
- import_playbook: 99-utils/cluster-status.yml
