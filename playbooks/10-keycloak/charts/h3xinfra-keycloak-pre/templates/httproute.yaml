{{- if .Values.ingress.enabled }}
---
# Single HTTPRoute with named rules.
#
# Two HTTPRoutes on the same hostname (`auth.app.example.com`) cause Envoy
# Gateway to emit duplicate vhost entries into the merged port-80/443
# route configs, and Envoy then rejects the entire xDS snapshot
# (`Only unique values for domains are permitted`), 500'ing every service
# that shares the gateway. Keep this as one HTTPRoute.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "h3xinfra-keycloak-pre.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "h3xinfra-keycloak-pre.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.ingress.gateway.name }}
      namespace: {{ .Values.ingress.gateway.namespace }}
  hostnames:
    - {{ .Values.ingress.host | quote }}
  rules:
    # Public realm/resource paths -- open to the internet.
    - name: public
      matches:
        - path:
            type: PathPrefix
            value: /realms/
        - path:
            type: PathPrefix
            value: /resources/
        - path:
            type: PathPrefix
            value: /js/
        - path:
            type: Exact
            value: /robots.txt
      backendRefs:
        - name: {{ .Values.ingress.serviceName }}
          port: {{ .Values.ingress.servicePort }}
    # Admin / metrics / health -- IP-restricted via SecurityPolicy
    # (currently disabled; see securitypolicy.yaml).
    - name: admin
      matches:
        - path:
            type: PathPrefix
            value: /admin/
        - path:
            type: PathPrefix
            value: /metrics
        - path:
            type: PathPrefix
            value: /health
      backendRefs:
        - name: {{ .Values.ingress.serviceName }}
          port: {{ .Values.ingress.servicePort }}
{{- end }}
