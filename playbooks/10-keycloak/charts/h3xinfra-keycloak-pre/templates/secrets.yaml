{{- if .Values.bootstrapSecret.enabled }}
---
# Keycloak operator bootstrap admin: consumed via Keycloak CR
# spec.bootstrapAdmin.user.secret. Only takes effect on the first
# operator-managed startup (when no admin row exists in master realm).
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "h3xinfra-keycloak-pre.bootstrapAdminSecretName" . }}
  labels:
    {{- include "h3xinfra-keycloak-pre.labels" . | nindent 4 }}
type: Opaque
stringData:
  username: {{ .Values.bootstrapSecret.adminUsername | quote }}
  password: {{ required "bootstrapSecret.adminPassword is required" .Values.bootstrapSecret.adminPassword | quote }}
{{- end }}
{{- if .Values.postgres.enabled }}
---
# Postgres credentials: shared between CNPG initdb (creates the role on
# bootstrap) and the Keycloak CR (db.usernameSecret / db.passwordSecret).
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "h3xinfra-keycloak-pre.postgresCredentialsSecretName" . }}
  labels:
    {{- include "h3xinfra-keycloak-pre.labels" . | nindent 4 }}
type: kubernetes.io/basic-auth
stringData:
  username: {{ .Values.postgres.username | quote }}
  password: {{ required "postgres.password is required" .Values.postgres.password | quote }}
{{- end }}
