{{- if .Values.bootstrapSecret.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "h3xinfra-keycloak-pre.bootstrapSecretName" . }}
  labels:
    {{- include "h3xinfra-keycloak-pre.labels" . | nindent 4 }}
type: Opaque
stringData:
  # admin-user / admin-password   - bootstrap Keycloak admin (codecentric chart
  #                                 reads via env in the standup playbook)
  # database-password             - shared between Postgres init and Keycloak
  admin-user: {{ .Values.bootstrapSecret.adminUsername | quote }}
  admin-password: {{ required "bootstrapSecret.adminPassword is required" .Values.bootstrapSecret.adminPassword | quote }}
  database-password: {{ required "bootstrapSecret.databasePassword is required" .Values.bootstrapSecret.databasePassword | quote }}
  # codecentric/keycloakx chart expects the DB password under key `password`
  # when consuming `database.existingSecret` without an explicit key override.
  password: {{ required "bootstrapSecret.databasePassword is required" .Values.bootstrapSecret.databasePassword | quote }}
{{- end }}
