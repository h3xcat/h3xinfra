---
# Full name override is set by the playbook.
nameOverride: ""
fullnameOverride: ""

# Bootstrap admin for Keycloak's master realm. The Keycloak Operator only
# uses this on first start (no admin row in DB) -- subsequent management
# goes through Terraform / the admin console.
bootstrapSecret:
  enabled: true
  adminUsername: "admin"
  adminPassword: ""

# CloudNativePG-managed Postgres cluster backing Keycloak.
postgres:
  enabled: true
  # Used as image: ghcr.io/cloudnative-pg/postgresql:<imageTag>
  imageTag: "18.3"
  instances: 2
  database: "keycloak"
  username: "keycloak"
  password: ""
  persistence:
    storageClass: "longhorn"
    size: "8Gi"
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "1Gi"

# Gateway API HTTPRoute. Backend is the Service the Keycloak Operator
# renders for the Keycloak CR -- by default that is `<keycloak-cr>-service`
# on port 8080 (we terminate TLS at Envoy Gateway, so http is enabled in
# the CR).
ingress:
  enabled: true
  host: "auth.app"
  gateway:
    name: ""
    namespace: ""
  serviceName: "keycloak"
  servicePort: 8080
  trustedSetupIPs: []
