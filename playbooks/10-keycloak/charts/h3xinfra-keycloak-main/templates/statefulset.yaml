apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "h3xinfra-keycloak-main.fullname" . }}
  labels:
    {{- include "h3xinfra-keycloak-main.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "h3xinfra-keycloak-main.fullname" . }}-headless
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "h3xinfra-keycloak-main.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "h3xinfra-keycloak-main.selectorLabels" . | nindent 8 }}
    spec:
      # Run the pod inside its own user namespace (defense in depth, see SECURITY_AUDIT.md F5 follow-up).
      hostUsers: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
      # Wait for the Postgres service rendered by the pre-chart to accept
      # connections before letting Keycloak start. Avoids needless restarts
      # on first roll-out.
      - name: wait-for-postgres
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command:
        - /bin/sh
        - -c
        - |
          until (echo > /dev/tcp/{{ .Values.database.hostname }}/{{ .Values.database.port }}) >/dev/null 2>&1; do
            echo "Waiting for {{ .Values.database.hostname }}:{{ .Values.database.port }}..."
            sleep 2
          done
      containers:
      - name: keycloak
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        args: ["start"]
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: management
          containerPort: 9000
          protocol: TCP
        env:
        # Bootstrap admin (Keycloak 26 reads KC_BOOTSTRAP_ADMIN_USERNAME /
        # _PASSWORD on first startup; legacy KEYCLOAK_ADMIN* still work but
        # are deprecated.)
        - name: KC_BOOTSTRAP_ADMIN_USERNAME
          valueFrom:
            secretKeyRef:
              name: {{ required "bootstrapSecretName is required" .Values.bootstrapSecretName }}
              key: admin-user
        - name: KC_BOOTSTRAP_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.bootstrapSecretName }}
              key: admin-password
        - name: KC_DB
          value: "postgres"
        - name: KC_DB_URL
          value: "jdbc:postgresql://{{ .Values.database.hostname }}:{{ .Values.database.port }}/{{ .Values.database.database }}"
        - name: KC_DB_USERNAME
          value: {{ .Values.database.username | quote }}
        - name: KC_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.bootstrapSecretName }}
              key: database-password
        - name: KC_HOSTNAME
          value: "https://{{ required "hostname is required" .Values.hostname }}"
        - name: KC_HOSTNAME_STRICT
          value: "false"
        - name: KC_HTTP_ENABLED
          value: "true"
        - name: KC_PROXY_HEADERS
          value: "xforwarded"
        - name: KC_HEALTH_ENABLED
          value: "true"
        - name: KC_METRICS_ENABLED
          value: "true"
        {{- with .Values.extraEnv }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        startupProbe:
          httpGet:
            path: /health/started
            port: management
          initialDelaySeconds: 15
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 60
        readinessProbe:
          httpGet:
            path: /health/ready
            port: management
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health/live
            port: management
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
