apiVersion: v1
kind: Service
metadata:
  name: {{ include "h3xinfra-keycloak-main.fullname" . }}
  labels:
    {{- include "h3xinfra-keycloak-main.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "h3xinfra-keycloak-main.selectorLabels" . | nindent 4 }}
  ports:
  - name: http
    port: {{ .Values.service.port }}
    targetPort: http
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "h3xinfra-keycloak-main.fullname" . }}-headless
  labels:
    {{- include "h3xinfra-keycloak-main.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "h3xinfra-keycloak-main.selectorLabels" . | nindent 4 }}
  ports:
  - name: http
    port: 8080
    targetPort: http
    protocol: TCP
