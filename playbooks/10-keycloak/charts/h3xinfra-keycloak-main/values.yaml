---
nameOverride: ""
fullnameOverride: ""

image:
  repository: "quay.io/keycloak/keycloak"
  tag: "26.6.1"

# Replica count for the Keycloak StatefulSet the operator renders.
# 2+ enables Infinispan distributed cache for session replication
# across nodes (the operator wires JGroups KUBE_PING automatically).
instances: 2

# Public hostname Keycloak advertises (must match the HTTPRoute hostname
# in the pre-chart).
hostname: ""

# Secret rendered by the pre-chart holding `username` / `password` for
# the master-realm bootstrap admin.
bootstrapAdminSecretName: ""

# External Postgres connection -- typically the `<cluster>-rw` Service
# of the CNPG Cluster created in the pre-chart.
database:
  host: ""
  port: 5432
  database: "keycloak"
  credentialsSecretName: ""

resources: {}

# Extra Keycloak --<option>=<value> args. List of {name, value} or
# {name, secret: {name, key}} dicts; passed verbatim into the CR.
additionalOptions: []
