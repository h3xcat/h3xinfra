---
- import_playbook: ../99-utils/kube-connect.yml

# -----------------------------------------------------------------------------
# Phase 1: Install the Keycloak Operator + deploy a CNPG-backed Keycloak.
#
# The operator owns the StatefulSet, the Service, anti-affinity, the PDB and
# JGroups KUBE_PING discovery for multi-instance Infinispan cache. Postgres
# is a CloudNativePG `Cluster` so a node failure does not take auth down.
# -----------------------------------------------------------------------------
- name: Deploy Keycloak (Operator + CNPG)
  hosts: k8s
  gather_facts: false

  tasks:
    - name: Create Keycloak namespace
      kubernetes.core.k8s:
        name: "{{ keycloak.namespace }}"
        api_version: v1
        kind: Namespace
        state: present
        wait: true

    # The Keycloak Operator is distributed as raw kubernetes manifests
    # (no upstream Helm chart). Pin to chart_versions.keycloak so the
    # operator and the keycloak image stay in lockstep.
    - name: Apply Keycloak Operator manifests
      ansible.builtin.command:
        cmd: >-
          kubectl apply -n {{ keycloak.namespace }}
          -f https://raw.githubusercontent.com/keycloak/keycloak-k8s-resources/{{ chart_versions.keycloak }}/kubernetes/{{ item }}
      register: kc_operator_apply
      changed_when: >-
        kc_operator_apply.stdout_lines
        | reject('search', ' unchanged$')
        | select('search', ' (created|configured|serverside-applied)$')
        | list | length > 0
      loop:
      - keycloaks.k8s.keycloak.org-v1.yml
      - keycloakrealmimports.k8s.keycloak.org-v1.yml
      - kubernetes.yml

    - name: Wait for Keycloak Operator deployment to be Available
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: Deployment
        namespace: "{{ keycloak.namespace }}"
        name: keycloak-operator
      register: kc_operator_deploy
      until: >-
        kc_operator_deploy.resources | length > 0
        and (kc_operator_deploy.resources[0].status.availableReplicas | default(0)) >= 1
      retries: 30
      delay: 5

    # -------------------------------------------------------------------------
    # pre-chart: bootstrap secrets, CNPG Postgres Cluster, HTTPRoute,
    # SecurityPolicy. Rendered before the Keycloak CR so the secrets the
    # CR references (admin + db credentials) and the database itself
    # exist by the time the operator starts reconciling.
    # -------------------------------------------------------------------------
    - name: Deploy Keycloak pre-configuration via Helm
      kubernetes.core.helm:
        name: "{{ keycloak.release_name_prefix }}-pre"
        chart_ref: "{{ playbook_dir }}/charts/h3xinfra-keycloak-pre"
        namespace: "{{ keycloak.namespace }}"
        create_namespace: false
        values:
          fullnameOverride: "{{ keycloak.release_name_prefix }}-pre"
          bootstrapSecret:
            enabled: true
            adminUsername: "{{ keycloak.admin.username }}"
            adminPassword: "{{ keycloak.admin.password }}"
          postgres:
            enabled: true
            imageTag: "{{ image_versions.postgresql }}"
            instances: "{{ keycloak.postgresql.instances | default(2) }}"
            database: "{{ keycloak.postgresql.auth.database | default('keycloak') }}"
            username: "{{ keycloak.postgresql.auth.username | default('keycloak') }}"
            password: "{{ keycloak.db_password }}"
            persistence:
              storageClass: "{{ keycloak.postgresql.persistence.storageClass | default('longhorn') }}"
              size: "{{ keycloak.postgresql.persistence.size | default('8Gi') }}"
          ingress:
            enabled: "{{ keycloak.ingress.enabled | default(true) }}"
            host: "{{ keycloak.ingress.hostname }}"
            gateway:
              name: "{{ gateway.release_name_prefix }}-pre-shared"
              namespace: "{{ gateway.namespace }}"
            # Service rendered by the Keycloak Operator from the Keycloak CR.
            # Naming convention: `<keycloak-cr-name>-service`.
            serviceName: "{{ keycloak.release_name_prefix }}-main-service"
            servicePort: 8080
            trustedSetupIPs: "{{ keycloak.ingress.trusted_setup_ips | default([]) }}"
        state: present
        wait: true
        timeout: "300s"
      no_log: true

    - name: Wait for Keycloak Postgres CNPG Cluster to be healthy
      kubernetes.core.k8s_info:
        api_version: postgresql.cnpg.io/v1
        kind: Cluster
        namespace: "{{ keycloak.namespace }}"
        name: "{{ keycloak.release_name_prefix }}-pre-postgres"
      register: kc_pg_cluster
      until: >-
        kc_pg_cluster.resources | length > 0
        and (kc_pg_cluster.resources[0].status.phase | default('')) == 'Cluster in healthy state'
      retries: 120
      delay: 5

    # -------------------------------------------------------------------------
    # main-chart: the Keycloak CR. The operator reconciles it into a
    # StatefulSet, Service, PDB, and JGroups-clustered Infinispan cache.
    # -------------------------------------------------------------------------
    - name: Deploy Keycloak CR via Helm
      kubernetes.core.helm:
        name: "{{ keycloak.release_name_prefix }}-main"
        chart_ref: "{{ playbook_dir }}/charts/h3xinfra-keycloak-main"
        release_namespace: "{{ keycloak.namespace }}"
        create_namespace: false
        values:
          fullnameOverride: "{{ keycloak.release_name_prefix }}-main"
          image:
            repository: "quay.io/keycloak/keycloak"
            tag: "{{ chart_versions.keycloak }}"
          instances: "{{ keycloak.replicas | default(2) }}"
          hostname: "{{ keycloak.ingress.hostname }}"
          bootstrapAdminSecretName: "{{ keycloak.release_name_prefix }}-pre-bootstrap-admin"
          database:
            host: "{{ keycloak.release_name_prefix }}-pre-postgres-rw"
            port: 5432
            database: "{{ keycloak.postgresql.auth.database | default('keycloak') }}"
            credentialsSecretName: "{{ keycloak.release_name_prefix }}-pre-postgres-credentials"
          resources: "{{ keycloak.resources | default({}) }}"
        state: present
        wait: true
        timeout: "300s"

    - name: Wait for Keycloak instance to reach Ready condition
      kubernetes.core.k8s_info:
        api_version: k8s.keycloak.org/v2alpha1
        kind: Keycloak
        namespace: "{{ keycloak.namespace }}"
        name: "{{ keycloak.release_name_prefix }}-main"
      register: kc_instance
      until: >-
        kc_instance.resources | length > 0
        and (kc_instance.resources[0].status.conditions | default([])
             | selectattr('type', 'eq', 'Ready')
             | selectattr('status', 'eq', 'True') | list | length) > 0
      retries: 90
      delay: 10

    - name: Wait for Keycloak admin endpoint to answer
      ansible.builtin.uri:
        url: "{{ keycloak.issuer_url_base }}/realms/master/.well-known/openid-configuration"
        method: GET
        status_code: 200
        return_content: false
        validate_certs: true
      register: keycloak_ready
      retries: 30
      delay: 10
      until: keycloak_ready.status == 200

# -----------------------------------------------------------------------------
# Phase 2: Configure realm + clients via Terraform.
#
# The Terraform state is kept locally under the terraform/ directory and
# committed as `terraform.tfstate.d/...` -- see terraform/.gitignore. For a
# shared/remote backend, drop a `backend.tf` under terraform/ and `terraform
# init -reconfigure` will migrate automatically on the next run.
# -----------------------------------------------------------------------------
- name: Configure Keycloak realm via Terraform
  hosts: k8s
  gather_facts: false
  vars:
    terraform_dir: "{{ playbook_dir }}/terraform"
    # State backend dir (matches backend.tf); kept on NAS so any controller
    # clone shares the same state.
    terraform_state_dir: "/h3xinfra/state/keycloak"

  tasks:
    - name: Ensure Terraform workspace directory exists
      ansible.builtin.file:
        path: "{{ terraform_dir }}"
        state: directory
        mode: "0755"

    - name: Ensure Terraform state directory exists on NAS
      ansible.builtin.file:
        path: "{{ terraform_state_dir }}"
        state: directory

    - name: Render Terraform variables file
      ansible.builtin.copy:
        dest: "{{ terraform_dir }}/terraform.tfvars.json"
        mode: "0600"
        content: "{{ {
            'keycloak_url': keycloak.issuer_url_base,
            'keycloak_admin_username': keycloak.admin.username,
            'keycloak_admin_password': keycloak.admin.password,
            'realm_name': keycloak.realm.name,
            'realm_display_name': keycloak.realm.display_name,
            'smtp': keycloak.realm.smtp,
            'clients': keycloak.clients | default([])
          } | to_nice_json }}"
      no_log: true

    - name: Apply Terraform configuration
      community.general.terraform:
        project_path: "{{ terraform_dir }}"
        state: present
        force_init: true
        variables_files:
        - "{{ terraform_dir }}/terraform.tfvars.json"
      register: tf_apply

    - name: Show Terraform outputs
      ansible.builtin.debug:
        var: tf_apply.outputs
      when: tf_apply.outputs is defined
