---
# Kubernetes Reboot Daemon configuration.
#
# Behavior: watches /var/run/reboot-required on every node (DaemonSet).
# When that sentinel file appears (typically created by unattended-upgrades
# after a kernel/security update), kured acquires a cluster-wide lock,
# drains the node, reboots it, waits for Ready, releases the lock.
# Repeats for the next node that needs a reboot.
kured:
  namespace: "kured"
  release_name_prefix: "h3xinfra-kured"

  # How often to check the sentinel. Default 1h is fine; lower for testing.
  period: "1h"

  # Pod termination grace period during drain. 180s gives Plex, *arr apps,
  # and CNPG/Keycloak ample time for clean shutdown.
  drain_grace_period: "180"

  # Delay between drain completion and reboot command. Lets Longhorn
  # observe the cordon + finish migrating replicas off the node.
  reboot_delay: "60s"

  # Auto-release the cluster lock if a reboot stalls (e.g. node never
  # comes back Ready). Keeps the rest of the fleet reboot-able.
  lock_ttl: "30m"

  # Optional maintenance window. Empty = 24/7 eligible to reboot.
  # Example: only reboot between 02:00 and 06:00 UTC:
  #   start_time: "02:00"
  #   end_time:   "06:00"
  #   time_zone:  "UTC"
  start_time: ""
  end_time: ""
  time_zone: ""

  # Tolerations for kured DaemonSet pod. kured must run on every node so
  # any node can get rebooted. Default matches the system-DS pattern of
  # tolerating all taints (cilium, csi-driver-smb, etc.) — appropriate
  # since you can't reboot a node without an agent on it.
  tolerations:
    - operator: Exists

  # Optional notification webhook (Slack, Discord via shoutrrr, etc.).
  # Example:
  #   extra_env_vars:
  #     - name: KURED_NOTIFY_URL
  #       valueFrom:
  #         secretKeyRef:
  #           name: kured-notify
  #           key: url
  extra_env_vars: []
