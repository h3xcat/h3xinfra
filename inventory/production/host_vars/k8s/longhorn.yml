---
longhorn:
  namespace: "longhorn-system"
  release_name_prefix: "h3xinfra-longhorn"
  cifs_username: "longhorn"
  cifs_password: "{{ longhorn_cifs_password }}"
  # Replace with your actual NAS backup target
  cifs_backup_target: "cifs://nas.example.com/longhorn-backup"

  ingress_host: "longhorn.app.example.com"

  # Trusted client CIDRs (applied as Envoy Gateway SecurityPolicy IP allowlist).
  trusted_ips:
    - "192.168.0.0/16"
    - "2001:db8:7c20:a470::/60"

  # Authentication. With Envoy Gateway, "oauth2_proxy" enables a
  # SecurityPolicy.oidc filter on the HTTPRoute (no oauth2-proxy sidecar);
  # "none" disables auth (relies on `trusted_ips` only). Basic auth is no
  # longer supported by the Gateway API setup.
  # The "oauth2_proxy" key is preserved for backwards compat with vault entries.
  auth:
    method: "oauth2_proxy"          # Options: none, oauth2_proxy
    oauth2_proxy:
      oidc_issuer_url: "https://auth.app.example.com/realms/h3xinfra"
      client_id: "longhorn"
      client_secret: "{{ longhorn_oidc_client_secret }}"
